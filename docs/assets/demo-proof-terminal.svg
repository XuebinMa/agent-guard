<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980" role="img" aria-labelledby="title desc">
  <title id="title">agent-guard proof demo terminal screenshot</title>
  <desc id="desc">Terminal-style screenshot showing a safe shell command allowed and risky commands blocked by agent-guard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="980" fill="#f8fafc"/>
  <text x="92" y="88" fill="#0f172a" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="700">
    agent-guard proof demo
  </text>
  <text x="92" y="126" fill="#475569" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20">
    Real output from npm run demo:proof --prefix crates/agent-guard-node
  </text>

  <g filter="url(#shadow)">
    <rect x="72" y="164" width="1056" height="748" rx="26" fill="url(#bg)"/>
    <rect x="72" y="164" width="1056" height="60" rx="26" fill="#1e293b"/>
    <circle cx="114" cy="194" r="9" fill="#fb7185"/>
    <circle cx="144" cy="194" r="9" fill="#fbbf24"/>
    <circle cx="174" cy="194" r="9" fill="#4ade80"/>
    <text x="528" y="202" text-anchor="middle" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18">
      xuebin@macbook: ~/Projects/agent-guard
    </text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="23">
    <text x="102" y="272" fill="#38bdf8">$ npm run demo:proof --prefix crates/agent-guard-node</text>
    <text x="102" y="322" fill="#e2e8f0">=== Safe Command ===</text>
    <text x="102" y="356" fill="#94a3b8">command: echo hello from attack demo</text>
    <text x="102" y="390" fill="#94a3b8">without guard: UNSAFE_HANDLER_WOULD_RUN:echo hello from attack demo</text>
    <text x="102" y="424" fill="#4ade80">with guard: allowed</text>
    <text x="102" y="458" fill="#e2e8f0">guard result: hello from attack demo</text>

    <text x="102" y="530" fill="#e2e8f0">=== Approval Required Command ===</text>
    <text x="102" y="564" fill="#94a3b8">command: git push origin main</text>
    <text x="102" y="598" fill="#94a3b8">without guard: UNSAFE_HANDLER_WOULD_RUN:git push origin main</text>
    <text x="102" y="632" fill="#f87171">with guard: blocked</text>
    <text x="102" y="666" fill="#fca5a5">guard error: AgentGuardAskRequiredError</text>
    <text x="102" y="700" fill="#fca5a5">decision: ask_user</text>
    <text x="102" y="734" fill="#fca5a5">code: AskRequired</text>

    <text x="102" y="806" fill="#e2e8f0">=== Destructive Command ===</text>
    <text x="102" y="840" fill="#94a3b8">command: rm -rf /</text>
    <text x="102" y="874" fill="#94a3b8">without guard: UNSAFE_HANDLER_WOULD_RUN:rm -rf /</text>
    <text x="102" y="908" fill="#f87171">with guard: blocked</text>
  </g>
</svg>
