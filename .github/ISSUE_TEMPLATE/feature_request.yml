name: 💡 Feature request
description: Suggest a capability, policy control, or integration for agent-guard.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to control or prevent that agent-guard can't do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should agent-guard do? Sketch the policy syntax, API, or behavior you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      multiple: true
      options:
        - Policy engine
        - Validators
        - Sandbox
        - SDK pipeline
        - Bindings (Python / Node)
        - CLI / tooling
        - Docs
    validations:
      required: false
