name: Security & Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-test:
    name: Rust Tests (Workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Run Tests
        run: cargo test --workspace --all-features

  linux-seccomp-integration:
    name: Linux Seccomp Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Run seccomp integration tests
        run: cargo test -p agent-guard-sandbox --features seccomp --test seccomp_integration -- --nocapture

  macos-seatbelt-integration:
    name: macOS Seatbelt Integration
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Run Seatbelt integration tests
        run: cargo test -p agent-guard-sandbox --features macos-sandbox --test macos_integration -- --nocapture

  windows-job-object-integration:
    name: Windows Job Object Integration
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Run Job Object integration tests
        run: cargo test -p agent-guard-sandbox --features windows-sandbox --test windows_job_integration -- --nocapture

  lint:
    name: Linting (Clippy & Fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Check Format
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  link-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Link Checker
        run: python3 scripts/check_docs.py

  python-test:
    name: Python Binding Tests
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install maturin pytest
      - name: Build and test
        run: |
          python -m venv .venv
          . .venv/bin/activate
          unset CONDA_PREFIX
          python -m pip install --upgrade pip
          python -m pip install maturin pytest
          cd crates/agent-guard-python
          maturin develop
          pytest tests/ -v

  node-framework-test:
    name: Node Binding & Framework Tests
    runs-on: ubuntu-latest
    needs: rust-test
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: crates/agent-guard-node/package-lock.json
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Install Node dependencies
        run: npm ci --prefix crates/agent-guard-node
      - name: Build Node binding
        run: npm run build:debug --prefix crates/agent-guard-node
      - name: Run Node tests
        run: npm test --prefix crates/agent-guard-node
      - name: Run demo smoke checks
        run: |
          npm run demo:quickstart --prefix crates/agent-guard-node
          npm run demo:flow --prefix crates/agent-guard-node
