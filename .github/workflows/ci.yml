name: Security & Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-test:
    name: Rust Tests (Workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Run Tests
        run: ./scripts/verify.sh rust

  linux-seccomp-integration:
    name: Linux Seccomp Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Run seccomp integration tests
        run: cargo test -p agent-guard-sandbox --features seccomp --test seccomp_integration -- --nocapture

  macos-seatbelt-integration:
    name: macOS Seatbelt Integration
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Run Seatbelt integration tests
        run: cargo test -p agent-guard-sandbox --features macos-sandbox --test macos_integration -- --nocapture

  windows-job-object-integration:
    name: Windows Job Object Integration
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Run Job Object integration tests
        run: cargo test -p agent-guard-sandbox --features windows-sandbox --test windows_job_integration -- --nocapture

  lint:
    name: Linting (Clippy & Fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Check Format
        run: ./scripts/verify.sh lint

  link-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Link Checker
        run: ./scripts/verify.sh docs

  python-test:
    name: Python Binding Tests
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and test
        run: ./scripts/verify.sh python

  python-sandbox-backend-test:
    name: Python Binding (seccomp backend)
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Build the module with the seccomp feature forwarded, then assert that
      # an explicit backend="linux-seccomp" request resolves to REAL isolation
      # (the default no-feature build asserts the truthful "none" instead).
      - name: Build and test with seccomp forwarded
        env:
          AGENT_GUARD_PY_BUILD_FEATURES: seccomp
          AGENT_GUARD_EXPECT_BACKEND: linux-seccomp
        run: ./scripts/verify.sh python

  node-sandbox-backend-test:
    name: Node Binding (seccomp backend)
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: crates/agent-guard-node/package-lock.json
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Build addon with seccomp forwarded
        run: |
          npm ci --prefix crates/agent-guard-node
          npm run build:debug --prefix crates/agent-guard-node -- --features seccomp
      - name: Run Node tests expecting real seccomp resolution
        env:
          AGENT_GUARD_EXPECT_BACKEND: linux-seccomp
        run: npm test --prefix crates/agent-guard-node

  python-framework-test:
    name: Python Framework Matrix
    runs-on: ubuntu-latest
    needs: rust-test
    strategy:
      fail-fast: false
      matrix:
        frameworks:
          # Supported series, pinned (mirrors the Node side's ^0.3 pin) …
          - "langchain-core>=0.3,<0.4"
          # … plus latest, deliberately unpinned so ecosystem drift that will
          # break the adapter surfaces here first instead of in user reports.
          - "langchain-core"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and test against real frameworks
        env:
          AGENT_GUARD_PY_FRAMEWORKS: ${{ matrix.frameworks }}
        run: ./scripts/verify.sh python

  node-framework-test:
    name: Node Binding & Framework Tests
    runs-on: ubuntu-latest
    needs: rust-test
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: crates/agent-guard-node/package-lock.json
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Run Node tests
        run: ./scripts/verify.sh node
      - name: Run demo smoke checks
        run: |
          npm run demo:quickstart --prefix crates/agent-guard-node
          npm run demo:flow --prefix crates/agent-guard-node
      # Posture (#41): the published surface is the compiled .node binary with
      # no runtime npm dependencies; the JS devDependencies (LangChain / OpenAI
      # agent SDKs) exist only for framework-parity tests and are not shipped, so
      # advisories there are accepted (documented in the crate README). Gate the
      # production dependency tree only, so a real shipped vulnerability fails CI
      # while dev-only advisories do not block.
      - name: Audit production dependencies
        run: |
          cd crates/agent-guard-node
          npm audit --omit=dev --audit-level=moderate

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      # The reqwest/rustls migration the previous blanket ignore list was
      # waiting on is done (now reqwest 0.13 / rustls 0.23 / hyper 1.x, and the
      # async-std path via the httpmock dev-dep is gone), so those ignores were
      # dropped and the audit runs unfiltered. If a new advisory surfaces, add a
      # specific `--ignore RUSTSEC-YYYY-NNNN` here with a dated one-line
      # justification rather than restoring a blanket list.
      - run: cargo audit

  parity-e2e:
    name: Cross-language Parity E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: crates/agent-guard-node/package-lock.json
      - name: Build Python binding (maturin develop)
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip maturin
          cd crates/agent-guard-python
          VIRTUAL_ENV="$GITHUB_WORKSPACE/.venv" \
            "$GITHUB_WORKSPACE/.venv/bin/maturin" develop --features extension-module
      - name: Build Node binding
        run: |
          cd crates/agent-guard-node
          npm ci
          npm run build:debug
      - name: Run cross-language parity comparator
        run: .venv/bin/python tests/cross-language-parity/compare.py

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate CycloneDX SBOM (per-crate, all features)
        run: cargo cyclonedx --format json --all-features
      - name: Collect SBOM artifacts
        run: |
          mkdir -p sbom-out
          find crates -name '*.cdx.json' -exec mv {} sbom-out/ \;
          ls -la sbom-out/
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-${{ github.run_id }}
          path: sbom-out/

  bench-artifact:
    name: Bench Artifact (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux sandbox deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Run benches
        run: |
          set -o pipefail
          mkdir -p bench-out
          cargo bench -p agent-guard-core --bench policy_check 2>&1 | tee bench-out/policy_check.txt
          cargo bench -p agent-guard-sdk  --bench audit_write 2>&1 | tee bench-out/audit_write.txt
          cargo bench -p agent-guard-sdk  --bench runtime_decision 2>&1 | tee bench-out/runtime_decision.txt
      - name: Summarize benches
        if: always()
        run: |
          {
            echo '## Bench results'
            echo
            for f in bench-out/*.txt; do
              echo "### $(basename "$f" .txt)"
              echo '```'
              grep -E 'time:|change:|Performance' "$f" || cat "$f"
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload bench artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.run_id }}
          path: |
            bench-out/
            target/criterion/
