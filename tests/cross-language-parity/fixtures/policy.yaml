version: 1
default_mode: workspace_write

tools:
  bash:
    mode: workspace_write
    deny:
      - prefix: "rm -rf"
      - prefix: "sudo"
      - regex: "curl\\s+.*\\|\\s*bash"
    ask:
      - prefix: "git push"
    allow:
      - prefix: "echo"
      - prefix: "ls"
      - prefix: "cat"
      - prefix: "cargo"

  write_file:
    mode: workspace_write
    deny_paths:
      - "/etc/**"
      - "**/.ssh/**"

  read_file:
    mode: workspace_write
    deny_paths:
      - "/etc/shadow"
      - "/etc/passwd"
      - "**/.ssh/id_*"

  http_request:
    mode: workspace_write
    deny:
      - regex: "^https?://169\\.254\\.169\\.254"
      # Method-aware rule (issue #39): DELETE to the internal API is denied,
      # while GET to the same host stays allowed.
      - regex: "^https?://api\\.internal\\.test/"
        method: DELETE

anomaly:
  enabled: false

audit:
  enabled: false
