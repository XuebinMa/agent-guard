# cargo-deny configuration
# Run locally:  cargo deny check
# CI:           .github/workflows/ci.yml — `cargo-deny` job

[graph]
all-features = true

[advisories]
yanked = "warn"
# No ignored advisories. The previous six entries (RUSTSEC-2026-0097/0098/0099/0104,
# RUSTSEC-2025-0052/0134) were resolved by upgrading reqwest 0.11 → 0.13
# (rustls 0.23, drops rustls-pemfile), httpmock 0.7 → 0.8 (drops async-std),
# and rand 0.8.5 → 0.8.6 (note: RUSTSEC-2026-0097 originated from our direct
# `rand` dep, not from the reqwest chain).
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "CDLA-Permissive-2.0",
    "OpenSSL",
]
confidence-threshold = 0.93

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
